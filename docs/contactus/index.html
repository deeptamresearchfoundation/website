        <!-- Contact_us starts-->
        <section class="contact">
            <div class="content">
                <h1>Contact Us</h1>
                <div class="h3">
                    <h2 style="font-weight: 100; padding-top: 20px;">Want to Contact Us</h2>
                </div>
            </div>
            <div class="containor">
                <div class="contactForm">
                    <form action="javascript:sendemail()" method="POST" id="form">
                        <h2>Send Message</h2>
                        <div class="inputBox">
                            <input type="text" spellcheck="false" name="Name" id="Name" required="required" autocomplete="off">
                            <span class="span">Full Name</span>
                        </div>
                        <div class="inputBox">
                            <input type="text" spellcheck="false" name="Email" id="Email" required="required" autocomplete="off">
                            <span class="span">Email</span>
                        </div>
                        <div class="inputBox">
                            <textarea wrap="on" spellcheck="false" required="required" name="message" id="message" autocomplete="off"></textarea>
                            <span class="span">Type Your Message...</span>
                        </div>
                        <div class="inputBox">
                            <button type="submit" value="Submit" class="button">
                                submit
                            </button>
                            <span id="load"></span>
                        </div>
                    </form>
                </div>
            </div>
        </section>
