    <link rel="stylesheet" href="../media/css//preloader.css">
    <style>
        #load {
            transition: 2s;
            margin-top: 5px;
            margin-bottom: 1px;
            position: absolute;
            left: 110px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: grey solid 5px;
            display: none;
            outline: none;
            border-top: lightskyblue 5px solid;
            animation: loading infinite 0.6s;
            animation-timing-function: linear;
        }

        @keyframes loading {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        textarea {
            cursor: auto;
        }
    </style>
</head>

<body onload="onloadispreload()">
    <h1 style="display: none;">Deeptam Research Foundation</h1>

    <div id="preloader">
        <div id="loader"></div>
    </div>

    <div id="bodycontent">
        <nav class="navbar navbar-expand-md bg-dark navbar-dark">
            <a class="navbar-brand" href="#"><img src="../media/images/LOGO.png" alt="icon"
                    style="width: 70px; height: 60px; border-radius: 50%;"></a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mr-auto">

                    </li>

                        <a class="nav-link" href="https://www.youtube.com/channel/UCxNpmV2gyok9bdtpMfQZj1A"
                            target="_blanck" rel="noopener noreferrer">Watch on YouTube</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../contactus/">Contact Us</a>
                    </li>
                </ul>
                <a href="../search/"><button class="btn btn-outline-success my-2 my-sm-0 form-inline my-2 my-lg-0"
                        type="submit">Search The
                        Courses</button></a>
            </div>
        </nav>

        <!-- Contact_us starts-->
        <div class="container">

            <div class="row">

                <div class="col-xl-8 offset-xl-2 py-5">
                    <h1>Contact Us</h1>
                    <p class="lead mt-4">Stuck at a problem. Feal free to contact with us and share the problem with us.
                        By
                        just fill up this Contact Us form.</p>
                    <form action="javascript:sendemail()" method="POST" id="form">
                        <div class="messages"></div>
                        <div class="controls">
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="form-group">
                                        <label for="form_name">Full Name <span class="text-danger">*</span></label>
                                        <input spellcheck="false" id="Name" name="Name" type="text" class="form-control"
                                            placeholder="Please enter your full name *" required="required"
                                            data-error="Firstname is required.">
                                        <div class="help-block with-errors"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="form-group">
                                        <label for="form_email">Email <span class="text-danger">*</span></label>
                                        <input spellcheck="false" id="Email" name="Email" type="email"
                                            class="form-control" placeholder="Please enter your email *"
                                            required="required" data-error="Valid email is required.">
                                        <div class="help-block with-errors"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="form-group">
                                        <label for="form_message">Message <span class="text-danger">*</span></label>
                                        <textarea spellcheck="false" id="message" name="message"
                                            class="form-control message" placeholder="Message for me *" rows="5"
                                            required="required" data-error="Please, leave us a message."></textarea>
                                        <div class="help-block with-errors"></div>
                                    </div>
                                </div>
                                <!-- <div class="col-md-12 mb-3">
                                    <div class="g-recaptcha" aria-required="true"
                                        data-sitekey="6Lfh3rEaAAAAAPVPVmMNm-aQg8FGAHAmaTl_YQGZ">
                                    </div>
                                </div> -->
                                <div class="col-md-12">
                                    <button class="g-recaptcha button btn btn-success btn-send" data-sitekey="reCAPTCHA_site_key"
                                        data-callback='onSubmit' data-action='submit'>Submit</button>
                                    <span id="load"></span>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <footer class="container-fluid bg-dark my-0 py-3 text-light">
            <p class="mb-0 text-center">Deeptam Research Foundation</p>
            <p class="mb-0 text-center">
                <a href="../" class="text-light">Home |</a>
                <a href="../videos/" class="text-light">Videos |</a>
                <a href="../contactus/" class="text-light">Contact Us</a>
            </p>
        </footer>

        <script src="../media/js/contactus.js"></script>
        <script>
            document.getElementById("form").onsubmit = function () {
                document.getElementById('load').style.display = "inline"
            }
        </script>

        <script src="https://www.google.com/recaptcha/api.js?render=6Leg1rEaAAAAAKiZgIG4lp7HuaM4xM0pL3b5Q4bg"></script>
        <script>
            function onSubmit(token) {
                document.getElementById("demo-form").submit();
            }
        </script>

        <script src="../media/js/load.js"></script>
